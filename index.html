<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zbahis</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Inter,Arial,sans-serif;
color:#fff;
}

.container{
max-width:760px;
margin:auto;
padding:20px;
}

.logo{
display:block;
margin:20px auto 30px;
max-width:240px;
}

.banner{
width:100%;
border-radius:18px;
display:block;
box-shadow:0 0 40px rgba(0,200,240,.15);
}

.offer{
margin-top:25px;
background:#0d0d0d;
border:1px solid rgba(0,200,240,.15);
border-radius:16px;
padding:25px;
}

.offer h1{
font-size:38px;
font-weight:900;
color:#00c8f0;
margin-bottom:10px;
}

.offer p{
font-size:20px;
color:#d7d7d7;
line-height:1.5;
}

.cta{
display:block;
text-decoration:none;
text-align:center;
margin-top:25px;
padding:22px;
border-radius:14px;
font-size:28px;
font-weight:800;
background:linear-gradient(135deg,#ff5a4f,#ff7347);
color:white;
box-shadow:0 0 30px rgba(255,90,79,.45);
transition:.2s;
}

.cta:hover{
transform:translateY(-2px);
}

.features{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:25px;
}

.feature{
background:#0d0d0d;
border:1px solid rgba(0,200,240,.15);
padding:18px;
border-radius:12px;
font-size:17px;
font-weight:600;
text-align:center;
color:#fff;
}

.feature:last-child{
grid-column:span 2;
}

.footer{
text-align:center;
margin-top:35px;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<img class="logo"
src="https://i.hizliresim.com/6fnmzz0.png">

<img class="banner"
src="https://i.hizliresim.com/8qzls9s.jpeg">

<div class="offer">

<h1>666 TL DENEME BONUSU</h1>

<p>
Çevrimsiz ve yatırımsız fırsattan yararlanmak için hemen katıl.
</p>

<a class="cta"
href="https://zbhs.short.gy/rFoz0f">
HEMEN KATIL
</a>

</div>

<div class="features">

<div class="feature">
⚡ Hızlı Kayıt
</div>

<div class="feature">
🎁 Güncel Kampanyalar
</div>

<div class="feature">
📱 Mobil Uyumlu
</div>

</div>

<div class="footer">
18+ | Sorumlu Oyun
</div>

</div>

</body>
</html>
